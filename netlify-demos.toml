# Deploy this file as netlify.toml on a SECOND Netlify site (project demos only).
# Site name suggestion: ahmed-portfolio-demos

[build]
  publish = "demos-dist"
  command = "chmod +x scripts/netlify_demos_build.sh && ./scripts/netlify_demos_build.sh"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "/apk/*"
  [headers.values]
    Content-Type = "application/vnd.android.package-archive"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
