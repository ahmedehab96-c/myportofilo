<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الخادم</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        h1 { font-size: 48px; margin: 0; }
        p { font-size: 24px; margin: 20px 0; }
        .success { color: #4ade80; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ الخادم يعمل!</h1>
        <p class="success">إذا رأيت هذه الصفحة، فالمشكلة في بناء Flutter</p>
        <p>الآن جرب بناء التطبيق مرة أخرى</p>
    </div>
</body>
</html>
